# biome.toml
# ────────────
# Tell Biome this is the root config
root = true

[vcs]
enabled = true
client_kind = "git"
use_ignore_file = true

[files]
ignore = ["dist", "node_modules", "src/components/ui"]

# Global formatter settings
[formatter]
# Maximum line width before wrapping
line_width = 100
# Use spaces, not tabs
indent_style = "space"
# Number of spaces per indentation level
indent_size = 2
# Enforce double-quotes for strings
quote_style = "double"
# Always emit semicolons
semi_colons = true

[organizeImports]
enabled = true

[linter]
enabled = true
rules.recommended = true

# Language-specific overrides (optional)
[language.javascript]
parser = "babel"

[language.typescript]
parser = "typescript"
